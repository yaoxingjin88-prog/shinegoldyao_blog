
<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级技术博客UI - 暗黑版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 全局构建 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Lucide 图标 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 隐藏未编译的 Vue 模板，防止闪烁 */
        [v-cloak] { display: none; }
        /* 暗黑模式基础底色 */
        body { background-color: #050505; color: #e5e7eb; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen selection:bg-cyan-500/30 overflow-hidden relative flex flex-col">
        
        <!-- 动态背景光晕 -->
        <div 
            class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-purple-600/20 blur-[120px] pointer-events-none animate-pulse" 
            style="animation-duration: 8s"
        ></div>
        <div 
            class="fixed bottom-[-20%] right-[-10%] w-[600px] h-[600px] rounded-full bg-cyan-600/10 blur-[150px] pointer-events-none animate-pulse" 
            style="animation-duration: 12s; animation-delay: 2s"
        ></div>

        <!-- 导航栏 -->
        <nav :class="[
            'fixed w-full z-50 transition-all duration-300',
            scrolled ? 'bg-[#050505]/80 backdrop-blur-lg border-b border-white/10 py-4 shadow-sm' : 'bg-transparent py-6'
        ]">
            <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center gap-2 group cursor-pointer" @click="currentPage = 'home'">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center text-white font-bold group-hover:shadow-[0_0_15px_rgba(34,211,238,0.6)] transition-all">
                        <i data-lucide="terminal" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">Dev<span class="text-cyan-400">Voyage</span></span>
                </div>
                <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                    <button @click="currentPage = 'home'" :class="['transition-colors', currentPage === 'home' ? 'text-cyan-400' : 'hover:text-cyan-400']">首页</button>
                    <button @click="currentPage = 'about'" :class="['transition-colors', currentPage === 'about' ? 'text-cyan-400' : 'hover:text-cyan-400']">关于我</button>
                    <button @click="currentPage = 'articles'" :class="['transition-colors', currentPage === 'articles' ? 'text-cyan-400' : 'hover:text-cyan-400']">文章</button>
                    <button @click="currentPage = 'projects'" :class="['transition-colors', currentPage === 'projects' ? 'text-cyan-400' : 'hover:text-cyan-400']">开源项目</button>
                    <button @click="currentPage = 'contact'" :class="['transition-colors', currentPage === 'contact' ? 'text-cyan-400' : 'hover:text-cyan-400']">联系方式</button>
                </div>
                <div class="flex gap-4">
                    <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
                    <a href="#" class="text-gray-400 hover:text-[#1DA1F2] transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl w-full mx-auto px-6 pt-32 pb-24 relative z-10 flex-grow">
            
            <!-- 首页视图 (Home View) -->
            <template v-if="currentPage === 'home'">
                <!-- 首屏区块 -->
                <section class="min-h-[70vh] flex flex-col justify-center items-start mt-10">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-cyan-400 text-sm mb-6 animate-fade-in-up">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                        </span>
                        探索技术的无限可能
                    </div>
                    
                    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 leading-tight animate-fade-in-up" style="animation-delay: 0.1s;">
                        <span class="block text-white">架构代码，</span>
                        <span class="block text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 pb-2">
                            书写未来。
                        </span>
                    </h1>
                    
                    <p class="text-lg md:text-xl text-gray-400 max-w-2xl mb-10 leading-relaxed animate-fade-in-up" style="animation-delay: 0.2s;">
                        你好，我是 <strong class="text-white font-medium">Alex</strong>。一名前端架构师与开源爱好者。在这里，我分享关于现代 Web 开发、高性能系统架构以及极客生活的深度思考。
                    </p>
                    
                    <div class="flex flex-wrap gap-4 animate-fade-in-up" style="animation-delay: 0.3s;">
                        <button class="px-8 py-3 rounded-full bg-white text-black font-semibold hover:bg-gray-200 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:-translate-y-0.5 transition-all duration-300 flex items-center gap-2 group">
                            <i data-lucide="book-open" class="w-4 h-4 group-hover:text-cyan-600 transition-colors"></i> 阅读最新文章
                        </button>
                        <button class="px-8 py-3 rounded-full bg-white/5 border border-white/10 text-white font-semibold hover:bg-white/10 hover:border-white/20 transition-all duration-300 flex items-center gap-2">
                            <i data-lucide="mail" class="w-4 h-4"></i> 订阅更新
                        </button>
                    </div>
                </section>

                <!-- 焦点推荐轮播图 (Featured Carousel) - 首屏下方 -->
                <section 
                    class="mb-32 relative w-full h-[450px] rounded-3xl overflow-hidden shadow-[0_20px_50px_-15px_rgba(0,0,0,0.7)] border border-white/5 group animate-fade-in-up"
                    style="animation-delay: 0.4s;"
                    @mouseenter="stopAutoplay"
                    @mouseleave="startAutoplay"
                >
                    <!-- 轮播内容列表 -->
                    <div 
                        v-for="(item, index) in carouselItems" 
                        :key="item.id"
                        class="absolute inset-0 transition-all duration-1000 ease-in-out"
                        :class="index === currentSlide ? 'opacity-100 scale-100 z-10' : 'opacity-0 scale-105 z-0 pointer-events-none'"
                    >
                        <!-- 暗黑渐变背景 -->
                        <div :class="['absolute inset-0', item.bg]"></div>
                        <!-- 氛围光晕 -->
                        <div :class="['absolute -right-20 -top-20 w-96 h-96 rounded-full blur-[100px] opacity-40 mix-blend-screen', item.blobColor]"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent"></div>
                        
                        <!-- 文本内容层 -->
                        <div class="absolute inset-0 p-8 md:p-16 flex flex-col justify-end">
                            <div class="animate-fade-in-up" style="animation-delay: 0.1s;">
                                <span class="inline-block px-3 py-1 bg-white/10 backdrop-blur-md rounded-full text-xs font-bold text-white mb-4 border border-white/10 shadow-lg">
                                    {{ item.tag }}
                                </span>
                                <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-4 leading-tight drop-shadow-lg">
                                    {{ item.title }}
                                </h2>
                                <p class="text-lg text-gray-300 max-w-2xl drop-shadow-md mb-8">
                                    {{ item.description }}
                                </p>
                                <button class="px-6 py-3 bg-white/10 backdrop-blur-md border border-white/20 text-white font-semibold rounded-full hover:bg-white hover:text-black transition-all duration-300 flex items-center gap-2 w-max group/btn">
                                    {{ item.btnText }} <i data-lucide="arrow-right" class="w-4 h-4 group-hover/btn:translate-x-1 transition-transform"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 左右控制按钮 -->
                    <button 
                        @click="prevSlide" 
                        class="absolute left-4 top-1/2 -translate-y-1/2 z-20 w-12 h-12 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white border border-white/10 opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-white/20 hover:scale-110"
                    >
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <button 
                        @click="nextSlide" 
                        class="absolute right-4 top-1/2 -translate-y-1/2 z-20 w-12 h-12 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white border border-white/10 opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-white/20 hover:scale-110"
                    >
                        <i data-lucide="chevron-right" class="w-6 h-6"></i>
                    </button>

                    <!-- 底部指示器 (Dots) -->
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex gap-3">
                        <button 
                            v-for="(_, index) in carouselItems" 
                            :key="index"
                            @click="goToSlide(index)"
                            class="transition-all duration-500 rounded-full"
                            :class="index === currentSlide ? 'w-10 h-1.5 bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)]' : 'w-2 h-1.5 bg-white/30 hover:bg-white/60'"
                            aria-label="切换轮播图"
                        ></button>
                    </div>
                </section>

                <!-- 技术栈徽章 (带有简介和Logo的扩容版) -->
                <section class="mb-32">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-white mb-2">核心武器库</h2>
                            <p class="text-gray-400">支撑现代 Web 应用的高性能技术栈</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-5">
                        <div 
                            v-for="(tech, idx) in techStack" 
                            :key="idx" 
                            class="group relative bg-white/[0.02] border border-white/5 rounded-2xl p-6 hover:border-white/10 hover:shadow-[0_8px_30px_rgba(0,0,0,0.5)] hover:-translate-y-1 transition-all duration-300 cursor-default overflow-hidden flex flex-col items-center justify-start text-center gap-3"
                        >
                            <!-- 专属品牌色的背景悬浮光晕 (暗黑模式下使用15%透明度) -->
                            <div :class="['absolute inset-0 bg-gradient-to-br opacity-0 group-hover:opacity-15 transition-opacity duration-500', tech.color]"></div>
                            
                            <!-- 官方 Logo -->
                            <div class="w-14 h-14 relative z-10 flex items-center justify-center transition-transform duration-500 group-hover:scale-110 group-hover:drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] mb-1">
                                <img :src="tech.logo" :alt="tech.name" class="w-11 h-11 object-contain">
                            </div>
                            
                            <!-- 技术名称与简介 -->
                            <div class="relative z-10 flex flex-col items-center">
                                <span class="text-base font-bold text-gray-300 group-hover:text-white transition-colors mb-1.5">
                                    {{ tech.name }}
                                </span>
                                <p class="text-xs text-gray-500 leading-relaxed group-hover:text-gray-400 transition-colors line-clamp-2">
                                    {{ tech.desc }}
                                </p>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 精选文章 -->
                <section id="articles" class="mb-24">
                    <div class="flex justify-between items-end mb-10">
                        <div>
                            <h2 class="text-3xl font-bold text-white mb-2">深度洞察</h2>
                            <p class="text-gray-400">近期发布的技术长文与实践总结</p>
                        </div>
                        <a href="#" class="hidden md:flex items-center gap-1 text-cyan-400 hover:text-cyan-300 transition-colors font-medium group">
                            查看全部 <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div 
                            v-for="post in posts" 
                            :key="post.id" 
                            class="group relative rounded-2xl bg-white/[0.02] border border-white/5 overflow-hidden hover:border-white/10 transition-all duration-500 hover:-translate-y-1 hover:shadow-[0_10px_40px_-10px_rgba(34,211,238,0.15)] flex flex-col cursor-pointer"
                        >
                            <div :class="['h-1 w-full opacity-50 group-hover:opacity-100 transition-opacity bg-gradient-to-r', post.gradient]"></div>
                            
                            <div class="h-48 w-full bg-[#0a0a0a] relative overflow-hidden p-6 flex flex-col justify-end">
                                <div :class="['absolute -right-10 -top-10 w-40 h-40 rounded-full blur-3xl opacity-20 group-hover:opacity-40 transition-opacity duration-500 bg-gradient-to-br', post.gradient]"></div>
                                <span class="relative z-10 text-xs font-bold uppercase tracking-wider text-white/70 bg-white/10 backdrop-blur-sm self-start px-3 py-1 rounded-full mb-2">
                                    {{ post.category }}
                                </span>
                            </div>

                            <div class="p-6 flex-grow flex flex-col">
                                <div class="flex items-center gap-3 text-xs text-gray-500 mb-3">
                                    <time>{{ post.date }}</time>
                                    <span class="w-1 h-1 rounded-full bg-gray-700"></span>
                                    <span>{{ post.readTime }}</span>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-3 leading-snug group-hover:text-cyan-400 transition-colors duration-300">
                                    {{ post.title }}
                                </h3>
                                <p class="text-gray-400 text-sm leading-relaxed flex-grow">
                                    {{ post.excerpt }}
                                </p>
                                
                                <div class="mt-6 flex items-center text-sm font-medium text-white/50 group-hover:text-white transition-colors">
                                    阅读全文 <i data-lucide="chevron-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform text-cyan-400"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button class="mt-8 w-full md:hidden py-4 rounded-xl border border-white/10 bg-white/5 text-white font-medium hover:bg-white/10 transition-colors">
                        查看所有文章
                    </button>
                </section>
            </template>

            <!-- 关于我视图 (About View) -->
            <template v-else-if="currentPage === 'about'">
                <section class="min-h-[75vh] mt-10 animate-fade-in-up">
                    <div class="flex flex-col lg:flex-row gap-16 items-start">
                        <!-- 左侧：个人简介 -->
                        <div class="w-full lg:w-3/5">
                            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">
                                关于 <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Alex</span>
                            </h1>
                            <div class="space-y-6 text-gray-400 text-lg leading-relaxed">
                                <p>
                                    我是一名前端架构师，对构建高性能、可扩展的现代 Web 应用充满热情。在过去的 8 年里，我参与了从初创企业到世界 500 强公司的各种复杂系统设计。
                                </p>
                                <p>
                                    我坚信“代码如诗”。除了日常的业务开发，我将大量的时间投入到了开源社区，致力于探索 WebAssembly、Rust 等边缘计算技术在浏览器端的极限。
                                </p>
                                <p>
                                    当我不敲代码的时候，我可能在玩赛博朋克风的单机游戏，或者在冲洗自己拍摄的胶卷。
                                </p>
                            </div>

                            <!-- 职业轨迹 (Timeline) -->
                            <h3 class="text-2xl font-bold text-white mt-16 mb-8 flex items-center gap-3">
                                <i data-lucide="briefcase" class="text-cyan-400"></i> 职业轨迹
                            </h3>
                            <div class="space-y-8 border-l-2 border-white/10 pl-6 ml-3 relative">
                                <div class="relative">
                                    <div class="absolute -left-[35px] top-1 w-4 h-4 rounded-full bg-cyan-500 shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>
                                    <h4 class="text-xl font-bold text-white">首席前端架构师 @ TechNova</h4>
                                    <p class="text-sm text-cyan-400 mb-2">2023 - 至今</p>
                                    <p class="text-gray-400 text-sm">主导公司核心 SaaS 平台的微前端架构演进，将首屏加载时间降低了 60%。引入 Rust 编写计算密集型 WebAssembly 模块。</p>
                                </div>
                                <div class="relative">
                                    <div class="absolute -left-[35px] top-1 w-4 h-4 rounded-full bg-white/20 border-2 border-white/50"></div>
                                    <h4 class="text-xl font-bold text-white">高级前端工程师 @ DataFlow</h4>
                                    <p class="text-sm text-gray-500 mb-2">2019 - 2023</p>
                                    <p class="text-gray-400 text-sm">负责数据可视化大屏的研发，基于 WebGL 和 Three.js 实现海量数据的流畅渲染。</p>
                                </div>
                            </div>
                        </div>

                        <!-- 右侧：技能雷达与头像 -->
                        <div class="w-full lg:w-2/5 space-y-8">
                            <!-- 极客风头像占位 -->
                            <div class="w-full aspect-square rounded-3xl bg-white/[0.02] border border-white/10 overflow-hidden relative flex items-center justify-center group">
                                <div class="absolute inset-0 bg-gradient-to-tr from-cyan-600/20 to-purple-600/20 opacity-50 group-hover:opacity-100 transition-opacity duration-500"></div>
                                <div class="absolute w-40 h-40 bg-cyan-400/30 rounded-full blur-[60px] animate-pulse"></div>
                                <i data-lucide="user" class="w-24 h-24 text-white/30 relative z-10 group-hover:scale-110 transition-transform duration-500"></i>
                            </div>

                            <!-- 技能条 -->
                            <div class="bg-white/[0.02] border border-white/10 rounded-2xl p-6">
                                <h4 class="text-white font-bold mb-6">专业技能</h4>
                                <div class="space-y-5">
                                    <div>
                                        <div class="flex justify-between text-sm mb-2"><span class="text-gray-300">前端架构 (React/Vue)</span><span class="text-cyan-400">95%</span></div>
                                        <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                            <div class="h-full bg-gradient-to-r from-cyan-400 to-blue-500 w-[95%]"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-2"><span class="text-gray-300">系统底层 (Rust/WASM)</span><span class="text-purple-400">85%</span></div>
                                        <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                            <div class="h-full bg-gradient-to-r from-purple-400 to-pink-500 w-[85%]"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-2"><span class="text-gray-300">UI/UX 设计</span><span class="text-emerald-400">80%</span></div>
                                        <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                            <div class="h-full bg-gradient-to-r from-emerald-400 to-cyan-400 w-[80%]"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </template>

            <!-- 文章列表视图 (Articles View) -->
            <template v-else-if="currentPage === 'articles'">
                <section class="min-h-[75vh] mt-10 animate-fade-in-up">
                    <div class="text-center max-w-2xl mx-auto mb-16">
                        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">
                            技术 <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">专栏</span>
                        </h1>
                        <p class="text-gray-400 text-lg">
                            记录我踩过的坑，以及那些让我拍案叫绝的架构设计。这里有超过 50 篇深度硬核技术长文。
                        </p>
                    </div>

                    <!-- 搜索与筛选工具栏 -->
                    <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
                        <div class="flex flex-wrap gap-2">
                            <button class="px-5 py-2 rounded-full bg-cyan-500/20 border border-cyan-500/50 text-cyan-400 text-sm font-medium">全部</button>
                            <button class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/10 text-sm font-medium transition-colors">前端工程</button>
                            <button class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/10 text-sm font-medium transition-colors">架构设计</button>
                            <button class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white hover:bg-white/10 text-sm font-medium transition-colors">系统底层</button>
                        </div>
                        <div class="relative w-full md:w-64">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                            <input type="text" placeholder="搜索文章..." class="w-full pl-10 pr-4 py-2 bg-black/40 border border-white/10 rounded-full text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400 transition-colors">
                        </div>
                    </div>

                    <!-- 文章网格 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <div 
                            v-for="post in [...posts, ...posts]" 
                            :key="post.id + Math.random()" 
                            class="group relative rounded-2xl bg-white/[0.02] border border-white/5 overflow-hidden hover:border-white/10 transition-all duration-500 hover:-translate-y-1 hover:shadow-[0_10px_40px_-10px_rgba(34,211,238,0.15)] flex flex-col cursor-pointer"
                        >
                            <div :class="['h-1 w-full opacity-50 group-hover:opacity-100 transition-opacity bg-gradient-to-r', post.gradient]"></div>
                            <div class="h-48 w-full bg-[#0a0a0a] relative overflow-hidden p-6 flex flex-col justify-end">
